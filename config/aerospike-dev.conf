# Aerospike CE Configuration - Development
# Environment: Dev/local
# Cluster Role: Single-node for local dev

service {
    node-id dev1
    cluster-name nayud-dev

    user root
    group root
    pidfile /var/run/aerospike/asd.pid
    proto-fd-max 4096

    service-threads 2
    transaction-queues 2
    transaction-threads-per-queue 2

    run-as-daemon false
    console-log-level INFO
}

logging {
    file /var/log/aerospike/aerospike.log {
        context any INFO
    }
    console {
        context any INFO
    }
}

network {
    service {
        address any
        port 3000
        proto-fd-idle-ms 60000
    }

    heartbeat {
        mode mesh
        port 3002
        address 127.0.0.1
        mesh-seed-address-port 127.0.0.1 3002
        interval 150
        timeout 10
    }

    fabric {
        port 3001
        address 127.0.0.1
    }

    info {
        port 3003
    }
}

namespace nayud {
    replication-factor 1
    default-ttl 0
    conflict-resolution-policy last-update-time

    # Use memory storage for dev simplicity
    storage-engine memory {
        data-size 1G
    }

    memory-size 2G

    high-water-memory-pct 80
    high-water-disk-pct 80
    stop-writes-pct 85

    migrate-threads 1
    nsup-period 120
    nsup-threads 1

    commit-to-device false
    tomb-raider-eligible-age 3600
}

mod-lua {
    system-path /opt/aerospike/sys/udf/lua
    user-path /opt/aerospike/usr/udf/lua
}