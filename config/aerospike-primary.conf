# Aerospike CE Configuration - Primary Cluster
# Environment: Production
# Cluster Role: Primary (active cluster for dual-write setup)
# Version: Compatible with Aerospike CE 7.0+

# Service configuration
service {
    # Identity and clustering
    node-id a1          # Unique per node: a1, a2, a3, etc.
    cluster-name nayud-primary
    
    # Process and resource limits
    user root
    group root
    pidfile /var/run/aerospike/asd.pid
    proto-fd-max 15000  # Max file descriptors for client connections
    
    # Performance tuning
    service-threads 8   # CPU cores * 1 (adjust based on actual core count)
    transaction-queues 8
    transaction-threads-per-queue 4
    
    # Transaction policies and timeouts
    transaction-retry-ms 1000
    transaction-max-ms 10000
    batch-index-threads 4
    
    # Logging
    run-as-daemon true
    console-log-level INFO
    
    # Security (if TLS enabled - controlled via environment)
    # enable-security true  # Uncomment if authentication needed
}

# Logging configuration
logging {
    file /var/log/aerospike/aerospike.log {
        context any INFO
        # Never log sensitive data
    }
    
    # Optional console logging for debugging
    console {
        context any INFO
    }
}

# Network configuration
network {
    service {
        address any         # Bind to all interfaces
        port 3000           # Standard Aerospike port
        
        # Access control
        access-address 10.0.1.10  # Replace with actual node IP
        
        # Connection limits and timeouts
        proto-fd-idle-ms 60000
    }
    
    # Intra-cluster communication (heartbeat)
    heartbeat {
        mode mesh          # CE supports mesh mode
        port 3002
        address 10.0.1.10  # Replace with actual node IP
        
        # Mesh endpoints - list all nodes in the cluster
        mesh-seed-address-port 10.0.1.10 3002  # Self
        mesh-seed-address-port 10.0.1.11 3002  # Node 2
        mesh-seed-address-port 10.0.1.12 3002  # Node 3
        # Add more nodes as needed
        
        # Heartbeat timing
        interval 150       # ms between heartbeats
        timeout 10         # missed heartbeats before node marked dead
    }
    
    # Fabric (intra-cluster data replication)
    fabric {
        port 3001
        address 10.0.1.10  # Replace with actual node IP
        
        # Performance tuning
        channel-bulk-recv-threads 4
        channel-ctrl-recv-threads 2
        channel-rw-recv-threads 16
    }
    
    # Info port (for monitoring and admin)
    info {
        port 3003
        # Optional: restrict access
        # address 10.0.1.10
    }
}

# Namespace configuration - "nayud"
namespace nayud {
    # Replication and consistency
    replication-factor 2
    
    # Strong consistency (if acceptable for your use case)
    # strong-consistency true  # Uncomment if you need linearizable reads
    # Note: strong-consistency affects performance but provides stronger guarantees
    
    # Default policies
    default-ttl 0          # No expiration by default (override per-record)
    conflict-resolution-policy last-update-time
    
    # Storage engine configuration
    storage-engine device {
        # Primary storage files
        file /opt/aerospike/data/nayud.dat
        filesize 32G       # Adjust based on capacity planning
        
        # Data-in-memory for fast reads
        data-in-memory true
        
        # Write policies
        write-block-size 1M
        
        # Defragmentation
        defrag-lwm-pct 45
        defrag-queue-min 0
        defrag-sleep 1000
        
        # Flush and sync
        flush-max-ms 1000
        
        # Compression (disabled for CE/performance)
        compression none
    }
    
    # Memory configuration
    memory-size 8G         # Adjust based on capacity planning and data-in-memory
    
    # High water marks and stop-writes
    high-water-memory-pct 80
    high-water-disk-pct 80
    stop-writes-pct 85
    
    # Migration policies
    migrate-threads 1
    migrate-retransmit-ms 5000
    migrate-sleep 1
    
    # Namespace supervision (nsup) - for TTL expiration
    nsup-period 120        # seconds between nsup cycles
    nsup-threads 1
    
    # Transaction policies
    commit-to-device true
    tomb-raider-eligible-age 86400  # 24 hours
    
    # Indexing
    index-stage-size 1G
    
    # Sets configuration (if set-specific policies needed)
    # set session {
    #     set-stop-writes-count 100000000
    # }
}

# XDR configuration (not available in CE)
# Cross-datacenter replication is Enterprise feature
# We handle cross-cluster sync at application level

# Security configuration (if needed)
# security {
#     enable-quotas false
# }

# Audit configuration (Enterprise feature)
# audit {
#     enable-audit false
# }

# Monitoring and statistics
mod-lua {
    system-path /opt/aerospike/sys/udf/lua
    user-path /opt/aerospike/usr/udf/lua
}