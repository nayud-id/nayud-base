# Aerospike CE Configuration - Secondary Cluster
# Environment: Production
# Cluster Role: Secondary (passive cluster for dual-write + read-failover)
# Version: Compatible with Aerospike CE 7.0+

# Service configuration
service {
    # Identity and clustering
    node-id b1          # Unique per node: b1, b2, b3, etc.
    cluster-name nayud-secondary
    
    # Process and resource limits
    user root
    group root
    pidfile /var/run/aerospike/asd.pid
    proto-fd-max 15000
    
    # Performance tuning
    service-threads 8
    transaction-queues 8
    transaction-threads-per-queue 4
    
    # Transaction policies and timeouts
    transaction-retry-ms 1000
    transaction-max-ms 10000
    batch-index-threads 4
    
    # Logging
    run-as-daemon true
    console-log-level INFO
    
    # Security (if TLS enabled - controlled via environment)
    # enable-security true  # Uncomment if authentication needed (Enterprise)
}

# Logging configuration
logging {
    file /var/log/aerospike/aerospike.log {
        context any INFO
    }
    console {
        context any INFO
    }
}

# Network configuration
network {
    service {
        address any
        port 3000
        access-address 10.0.2.10  # Replace with actual node IP
        proto-fd-idle-ms 60000
    }
    
    heartbeat {
        mode mesh
        port 3002
        address 10.0.2.10  # Replace with actual node IP

        mesh-seed-address-port 10.0.2.10 3002  # Self
        mesh-seed-address-port 10.0.2.11 3002  # Node 2
        mesh-seed-address-port 10.0.2.12 3002  # Node 3

        interval 150
        timeout 10
    }
    
    fabric {
        port 3001
        address 10.0.2.10  # Replace with actual node IP

        channel-bulk-recv-threads 4
        channel-ctrl-recv-threads 2
        channel-rw-recv-threads 16
    }

    info {
        port 3003
        # address 10.0.2.10
    }
}

# Namespace configuration - "nayud"
namespace nayud {
    replication-factor 2

    # strong-consistency true  # Enterprise only; keep disabled in CE

    default-ttl 0
    conflict-resolution-policy last-update-time

    storage-engine device {
        file /opt/aerospike/data/nayud.dat
        filesize 32G
        data-in-memory true
        write-block-size 1M

        defrag-lwm-pct 45
        defrag-queue-min 0
        defrag-sleep 1000

        flush-max-ms 1000
        compression none
    }

    memory-size 8G

    high-water-memory-pct 80
    high-water-disk-pct 80
    stop-writes-pct 85

    migrate-threads 1
    migrate-retransmit-ms 5000
    migrate-sleep 1

    nsup-period 120
    nsup-threads 1

    commit-to-device true
    tomb-raider-eligible-age 86400

    index-stage-size 1G
}

mod-lua {
    system-path /opt/aerospike/sys/udf/lua
    user-path /opt/aerospike/usr/udf/lua
}